<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentiX - 卫星数据分析可视化平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        body {
            background-color: #0b1320;
            color: #e8edf3;
            padding: 40px 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            font-size: 42px;
            color: #42a5f5;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 18px;
            color: #90a4ae;
            margin-bottom: 40px;
        }
        .card {
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 30px;
            border: 1px solid rgba(66, 165, 245, 0.2);
        }
        h2 {
            color: #64b5f6;
            margin-bottom: 16px;
        }
        p {
            line-height: 1.7;
            color: #c5d0dd;
            margin-bottom: 12px;
        }
        .info-line {
            margin-top: 25px;
            font-size: 14px;
            color: #78909c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SentiX</h1>
        <div class="subtitle">SentiX卫星遥感 · 时空数据分析与可视化平台</div>

        <div class="card">
            <h2>站点部署测试页面</h2>
            <p>本页面用于测试 GitHub 仓库静态部署、域名解析、Cloudflare 接入连通性。</p>
            <p>项目定位：卫星影像处理、地表时序变化分析、遥感数据可视化展示。</p>

            <div class="info-line">
                Repository: sentix | 部署时间: 测试构建
            </div>
        </div>
    </div>
</body>
</html>
